<VirtualHost *:80>
    ServerName groozer.psychoware.website

    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass / http://127.0.0.1:4000/
    ProxyPassReverse / http://127.0.0.1:4000/

    ErrorLog ${APACHE_LOG_DIR}/groozer_error.log
    CustomLog ${APACHE_LOG_DIR}/groozer_access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =groozer.psychoware.website
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
